name: release

# Tag v<version> → build the wheel matrix, smoke-test a clean install on every
# supported OS, publish to PyPI (Trusted Publishing/OIDC — no token secrets) and
# attach the artifacts to a GitHub release. workflow_dispatch runs everything
# except the publish step, as a dry run.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-macos:
    # arm64 wheel with the compiled+signed stenocap (hatch_build.py)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      # The runner image ships Rust (stenodiar); fail early and loudly if that
      # ever changes rather than in the wheel-verify step.
      - run: cargo --version
      - run: uv build --wheel
      - name: Verify the wheel bundles a signed helper for macOS 14.4+
        run: |
          ls dist/*macosx_14_0_arm64.whl
          unzip -o dist/*.whl 'stenograf/bin/stenocap' -d /tmp/whl
          otool -l /tmp/whl/stenograf/bin/stenocap | grep -q 'minos 14.4'
          codesign -v /tmp/whl/stenograf/bin/stenocap
      - name: Verify the wheel bundles the stenodiar diarization helper
        # The build hook skips stenodiar when the runner lacks Rust rather
        # than failing every source install — but a *published* wheel without
        # it silently degrades estimated speaker counts, so refuse it here.
        run: |
          unzip -o dist/*.whl 'stenograf/bin/stenodiar' -d /tmp/whl
          test -x /tmp/whl/stenograf/bin/stenodiar
          /tmp/whl/stenograf/bin/stenodiar --help
      - uses: actions/upload-artifact@v7
        with:
          name: dist-macos
          path: dist/

  build-linux:
    # pure py3-none-any wheel + the sdist
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv build
      - name: Verify the pure wheel carries no helpers
        run: |
          ls dist/*py3-none-any.whl dist/*.tar.gz
          if unzip -l dist/*.whl | grep -qE 'stenocap|stenodiar'; then
            echo "pure wheel must not contain native helpers" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux
          path: dist/

  smoke-macos:
    # The acceptance the wheel exists for: a clean machine's `uv tool install`
    # yields a green doctor and a working pipeline (capture itself needs TCC
    # prompts no headless runner can answer; --replay drives the same pipeline
    # from a file).
    needs: build-macos
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: actions/download-artifact@v8
        with:
          name: dist-macos
          path: dist
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: brew install ffmpeg
      - run: uv tool install -p 3.13 ./dist/stenograf-*.whl
      - run: steno setup --models-only
      - run: steno doctor
      - name: Pipeline smoke on a synthetic WAV
        run: |
          python3 - <<'EOF'
          import math, struct, wave
          with wave.open("smoke.wav", "wb") as w:
              w.setnchannels(1); w.setsampwidth(2); w.setframerate(16000)
              w.writeframes(b"".join(
                  struct.pack("<h", int(8000 * math.sin(2 * math.pi * 440 * i / 16000)))
                  for i in range(16000 * 3)))
          EOF
          steno start --replay smoke.wav --local 1 --remote 0 --lang en --out smoke-out
          test -f smoke-out/transcript.json

  smoke-linux:
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: actions/download-artifact@v8
        with:
          name: dist-linux
          path: dist
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv tool install -p 3.13 ./dist/stenograf-*py3-none-any.whl
      - run: steno --version
      # Linux capture/ASR land in Phase 5; today the smoke is: the pure wheel
      # installs, the CLI runs, and the headless model download works.
      - run: steno setup --models-only

  smoke-windows:
    # Windows ships the same pure wheel Linux does (no native helpers), so there
    # is nothing extra to *build* — but nothing verified a clean Windows install
    # before publish either, which is how 0.2.1 shipped a launcher that died on
    # every meeting start. The launcher/TUI itself is covered by the headless
    # real-stack smoke in ci.yml's windows unit job; this leg is the *installed
    # artifact* check: the wheel installs, the CLI renders through a redirected
    # stdout, and the pipeline runs end to end from a file.
    needs: build-linux
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash # wheel globs + $HOME; the runner ships Git bash
    steps:
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: actions/download-artifact@v8
        with:
          name: dist-linux
          path: dist
      # uv installs tool executables to ~/.local/bin on Windows too.
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv tool install -p 3.13 ./dist/stenograf-*py3-none-any.whl
      - run: steno --version
      # ffmpeg is the bundled imageio-ffmpeg binary here — nothing to install.
      - run: steno setup --models-only
      - name: The report renders through a redirected stdout
        # doctor *exits 1* on a runner by design: it has no audio endpoint, so
        # the (non-optional) capture check fails. What this asserts is that the
        # report renders at all — piped Windows stdout uses the legacy code page,
        # and click.echo once crashed outright on the ✓/✗ glyphs (fixed by
        # reconfiguring the streams with errors="replace"; this pins it down).
        run: |
          steno doctor > doctor.txt 2>&1 || true
          cat doctor.txt
          grep -q "ASR backend" doctor.txt
          grep -q "ffmpeg" doctor.txt
      - name: Pipeline smoke on a synthetic WAV
        # Live WASAPI capture needs hardware no runner has; --replay drives the
        # same pipeline from a file.
        run: |
          uv run --no-project --python 3.13 python - <<'EOF'
          import math, struct, wave
          with wave.open("smoke.wav", "wb") as w:
              w.setnchannels(1); w.setsampwidth(2); w.setframerate(16000)
              w.writeframes(b"".join(
                  struct.pack("<h", int(8000 * math.sin(2 * math.pi * 440 * i / 16000)))
                  for i in range(16000 * 3)))
          EOF
          steno start --replay smoke.wav --local 1 --remote 0 --lang en --out smoke-out
          test -f smoke-out/transcript.json

  publish:
    needs: [smoke-macos, smoke-linux, smoke-windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
      contents: write # GitHub release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Verify the tag matches the project version
        run: |
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          test "${GITHUB_REF_NAME}" = "v${version}" || {
            echo "tag ${GITHUB_REF_NAME} != project version v${version}" >&2
            exit 1
          }
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Attach artifacts to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
